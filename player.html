<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scouting Report 2025-26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f7f5;
  --card: #ffffff;
  --ink: #14181f;
  --muted: #5b6470;
  --rule: #e6e6e6;
  --rule-soft: #efefec;
  --accent: #1f2a3a;
  --green: #2f7a4a;
  --green-bg: #e7f1ea;
  --amber: #b06b00;
  --amber-bg: #f6ecd9;
  --red: #b23a3a;
  --red-bg: #f4e1e1;
  --purple-light: #e8defc;
  --purple-deep: #5b2b9c;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'tnum' 1, 'lnum' 1;
}

main {
  max-width: 880px;
  margin: 0 auto;
  padding: 72px 44px 96px;
}

.eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

/* ---------- Header ---------- */
.header {
  display: grid;
  grid-template-columns: 1fr 140px;
  gap: 36px;
  align-items: start;
  padding-bottom: 36px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 48px;
}

.header h1 {
  font-size: 46px;
  line-height: 1.05;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin: 10px 0 8px;
  color: var(--ink);
}

.header .lede {
  font-size: 15px;
  color: var(--muted);
  font-weight: 500;
  margin: 0 0 20px;
}

.bio-strip {
  font-size: 13px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  margin-bottom: 18px;
}

.bio-strip span + span::before {
  content: "·";
  color: #c8c8c4;
  margin: 0 8px;
}

.scout-pill {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 7px 13px;
  border-radius: 3px;
}

.photo-placeholder {
  position: relative;
  width: 140px;
  height: 175px;
  background: linear-gradient(180deg, #f0f0ed 0%, #e4e4e0 100%);
  border: 1px solid var(--rule);
  border-radius: 4px;
  overflow: hidden;
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
}

.photo-placeholder .ph-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo-placeholder img {
  position: relative;
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}

/* ---------- Sections ---------- */
section { margin-bottom: 56px; }

.section-eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 16px;
}

/* ---------- KPI strip ---------- */
.kpi-strip {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 14px;
}

.kpi-card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 22px;
}

.kpi-eyebrow {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 14px;
}

.usage-big {
  font-size: 40px;
  font-weight: 600;
  letter-spacing: -0.015em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}

.usage-big .unit {
  font-size: 22px;
  color: var(--muted);
  font-weight: 500;
  margin-left: 2px;
}

.usage-label {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}

.usage-bar-wrap {
  position: relative;
  height: 8px;
  background: #f0f0ed;
  border-radius: 2px;
  margin: 22px 0 28px;
}

.usage-bar-fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--accent);
  border-radius: 2px;
}

.usage-bar-mark {
  position: absolute;
  top: -3px;
  bottom: -3px;
  width: 1px;
  background: #cfcfca;
}

.usage-role {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}

.usage-role-context {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

/* Efficiency */
.eff-cluster {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.eff-item .eff-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 5px;
}

.eff-item .eff-value {
  font-size: 26px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.015em;
  line-height: 1;
}

.eff-item .eff-context {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.4;
}

.val-green { color: var(--green); }
.val-amber { color: var(--amber); }
.val-red { color: var(--red); }
.val-muted { color: var(--muted); }

/* Foul tiles */
.foul-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.foul-mini {
  background: #faf9f6;
  border: 1px solid var(--rule-soft);
  border-radius: 4px;
  padding: 11px 12px;
}

.foul-mini .foul-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.foul-mini .foul-value {
  font-size: 20px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  margin-top: 3px;
  line-height: 1.1;
}

.foul-mini .foul-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}

.foul-net {
  grid-column: span 2;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 10px 12px;
  background: #faf9f6;
  border: 1px solid var(--rule-soft);
  border-radius: 4px;
  margin-top: 2px;
}

.foul-net-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.foul-net-value {
  font-size: 16px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.foul-note {
  font-size: 11px;
  color: var(--muted);
  margin-top: 12px;
  line-height: 1.45;
}

/* ---------- Synthesis ---------- */
.synthesis {
  background: var(--card);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 22px 26px;
}

.synthesis .section-eyebrow {
  margin-bottom: 10px;
}

.synthesis p {
  font-size: 15.5px;
  line-height: 1.6;
  margin: 0;
  color: var(--ink);
}

.synthesis ul {
  list-style: none;
  padding: 0;
  margin: 0;
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink);
}

.synthesis ul li {
  position: relative;
  padding-left: 16px;
  margin-bottom: 10px;
}

.synthesis ul li:last-child { margin-bottom: 0; }

.synthesis ul li::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0.62em;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

/* ---------- Strengths & Weaknesses ---------- */
.sw-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.sw-card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 22px;
}

.sw-card.strengths { border-left: 3px solid var(--green); }
.sw-card.weaknesses { border-left: 3px solid var(--red); }

.sw-card .kpi-eyebrow { margin-bottom: 14px; }

.sw-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sw-row {
  display: grid;
  grid-template-columns: 16px 1fr;
  column-gap: 10px;
  row-gap: 2px;
  align-items: baseline;
}

.sw-icon {
  font-size: 13px;
  font-weight: 600;
  line-height: 1;
  align-self: start;
  margin-top: 2px;
}

.sw-card.strengths .sw-icon { color: var(--green); }
.sw-card.weaknesses .sw-icon { color: var(--red); }

.sw-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.3;
}

.sw-name .sw-parent {
  color: var(--muted);
  font-weight: 400;
}

.sw-meta {
  font-size: 11.5px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  margin-top: 1px;
}

.sw-meta .sw-eff {
  font-weight: 700;
  font-size: 12px;
}

.sw-card.strengths .sw-meta .sw-eff { color: var(--green); }
.sw-card.weaknesses .sw-meta .sw-eff { color: var(--red); }

/* ---------- Play tiles ---------- */
.play-tiles {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.play-tile {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 22px 20px;
  display: flex;
  flex-direction: column;
}

.play-tile-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.play-name {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.005em;
  line-height: 1.2;
}

.play-meta {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 5px;
  font-variant-numeric: tabular-nums;
}

.play-pps {
  font-size: 38px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  margin-top: 22px;
  line-height: 1;
}

.play-pps-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-top: 6px;
}

.verdict {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 4px 9px;
  border-radius: 3px;
  margin-top: 16px;
  align-self: flex-start;
}

.v-excellent, .v-verygood { background: var(--green-bg); color: var(--green); }
.v-good, .v-average { background: var(--amber-bg); color: var(--amber); }
.v-belowavg { background: #f0f0ec; color: var(--muted); }
.v-poor { background: var(--red-bg); color: var(--red); }

.percentile {
  font-size: 11px;
  color: var(--muted);
  margin-top: 10px;
}

.play-details {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--rule);
}

.play-details summary {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  cursor: pointer;
  list-style: none;
  display: flex;
  align-items: center;
  user-select: none;
}

.play-details summary::-webkit-details-marker { display: none; }
.play-details summary .chev {
  margin-left: auto;
  font-size: 14px;
  font-weight: 400;
  transition: transform 0.15s;
}

.play-details[open] summary .chev { transform: rotate(45deg); }

.subcategory-list {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.sub-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 0.55fr;
  gap: 6px;
  font-size: 11.5px;
  font-variant-numeric: tabular-nums;
  align-items: baseline;
}

.sub-name { color: var(--ink); font-weight: 500; }
.sub-meta { color: var(--muted); font-size: 11px; }
.sub-pps { font-weight: 600; text-align: right; }

.play-note {
  font-size: 11.5px;
  color: var(--muted);
  line-height: 1.5;
  margin: 12px 0 0;
}

.more-plays-wrap {
  text-align: center;
  margin-top: 22px;
}

.more-plays-toggle {
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink);
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}

.more-plays-toggle:hover {
  background: var(--card);
  border-color: #d4d4d0;
}

.extra-plays {
  display: none;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-top: 14px;
}

.extra-plays.open { display: grid; }

/* ---------- Shot chart ---------- */
.shotchart-wrap {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 28px;
}

.shotchart {
  display: block;
  margin: 0 auto;
  max-width: 520px;
  width: 100%;
  height: auto;
}

.chart-legend {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 20px;
  text-align: center;
  line-height: 1.5;
}

.chart-legend .legend-row {
  display: inline-flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  justify-content: center;
}

.legend-swatch {
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.legend-gradient {
  display: inline-block;
  width: 60px;
  height: 9px;
  background: linear-gradient(90deg, var(--purple-light), var(--purple-deep));
  border-radius: 2px;
  border: 1px solid rgba(0,0,0,0.04);
}

.legend-dot {
  display: inline-block;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  border: 1.5px solid #fff;
  box-shadow: 0 0 0 1px var(--rule);
}

.chart-caveat {
  font-size: 11px;
  color: var(--muted);
  margin: 10px auto 0;
  text-align: center;
  font-style: italic;
  max-width: 540px;
  line-height: 1.5;
}

/* Zone data table */
.zone-table {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
  font-variant-numeric: tabular-nums;
}

.zone-table-head,
.zone-row {
  display: grid;
  grid-template-columns: 16px 1fr 72px 72px;
  align-items: center;
  column-gap: 14px;
  padding: 8px 4px;
}

.zone-table-head {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  padding-top: 0;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}

.zone-table-head span:nth-child(3),
.zone-table-head span:nth-child(4),
.zone-row .zone-vol,
.zone-row .zone-efg {
  text-align: right;
}

.zone-row {
  font-size: 13px;
  border-bottom: 1px solid var(--rule-soft);
}

.zone-row:last-child { border-bottom: none; }

.zone-swatch {
  display: inline-block;
  width: 14px;
  height: 14px;
  border-radius: 3px;
  border: 1px solid rgba(0,0,0,0.08);
}

.zone-name { color: var(--ink); font-weight: 500; }
.zone-vol { color: var(--muted); }
.zone-efg { font-weight: 600; }

/* ---------- Defense ---------- */
.defense-tiles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.def-tile {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 16px 18px;
}

.def-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.def-value {
  font-size: 26px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.015em;
  margin-top: 5px;
  line-height: 1;
}

.def-context {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.35;
}

.foul-card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 18px 22px;
  margin-top: 12px;
}

.foul-card .kpi-eyebrow { margin-bottom: 12px; }

.defense-note {
  font-size: 13.5px;
  color: var(--ink);
  margin: 18px 0 0;
  line-height: 1.55;
}

/* ---------- Footer ---------- */
.footer {
  border-top: 1px solid var(--rule);
  padding-top: 28px;
  margin-top: 64px;
  font-size: 11.5px;
  line-height: 1.65;
  color: var(--muted);
}

.footer p { margin: 0 0 14px; }
.byline { font-weight: 500; color: var(--ink); }
.footer a { color: var(--muted); text-decoration: underline; text-decoration-color: #d4d4d0; }
.footer a:hover { color: var(--ink); }

/* ---------- Responsive ---------- */
@media (max-width: 760px) {
  main { padding: 40px 22px 72px; }
  .header { grid-template-columns: 1fr; gap: 20px; }
  .header h1 { font-size: 36px; }
  .photo-placeholder { width: 120px; height: 150px; order: -1; }
  .kpi-strip { grid-template-columns: 1fr; }
  .play-tiles { grid-template-columns: 1fr; }
  .extra-plays.open { grid-template-columns: 1fr; }
  .defense-tiles { grid-template-columns: repeat(2, 1fr); }
  .sw-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main>

<!-- ============ HEADER ============ -->
<header class="header">
  <div>
    <div class="eyebrow" data-bind="season-eyebrow">Scouting Report</div>
    <h1 data-bind="name"></h1>
    <p class="lede" data-bind="lede"></p>
    <div class="bio-strip" data-bind="bio"></div>
    <span class="scout-pill" data-bind="archetype"></span>
  </div>
  <div class="photo-placeholder" id="player-photo" aria-label="Player photo">
    <span class="ph-fallback">Photo</span>
  </div>
</header>

<!-- ============ KPI STRIP ============ -->
<section>
  <div class="section-eyebrow">Profile</div>
  <div class="kpi-strip">

    <div class="kpi-card">
      <div class="kpi-eyebrow">Usage</div>
      <div class="usage-big"><span data-bind="usage-big"></span><span class="unit">%</span></div>

      <div class="usage-bar-wrap" aria-label="Usage scale with KenPom role bands">
        <div class="usage-bar-fill" data-bind="usage-bar-fill"></div>
        <div class="usage-bar-mark" style="left: 40%"></div>
        <div class="usage-bar-mark" style="left: 53.3%"></div>
        <div class="usage-bar-mark" style="left: 66.7%"></div>
        <div class="usage-bar-mark" style="left: 80%"></div>
        <div class="usage-bar-mark" style="left: 93.3%"></div>
      </div>

      <div class="usage-role" data-bind="usage-role"></div>
      <div class="usage-role-context" data-bind="usage-role-context"></div>
    </div>

    <div class="kpi-card">
      <div class="kpi-eyebrow">Efficiency</div>
      <div class="eff-cluster">
        <div class="eff-item">
          <div class="eff-label">ORtg</div>
          <div class="eff-value" data-bind="ortg"></div>
          <div class="eff-context" data-bind="ortg-context"></div>
        </div>
        <div class="eff-item">
          <div class="eff-label">TS%</div>
          <div class="eff-value" data-bind="ts"></div>
          <div class="eff-context" data-bind="ts-context"></div>
        </div>
        <div class="eff-item">
          <div class="eff-label">eFG%</div>
          <div class="eff-value" data-bind="efg"></div>
          <div class="eff-context" data-bind="efg-context"></div>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- ============ SYNTHESIS ============ -->
<section>
  <div class="synthesis">
    <div class="section-eyebrow">Analysis</div>
    <div id="analysis-slot"></div>
  </div>
</section>

<!-- ============ STRENGTHS & WEAKNESSES ============ -->
<section id="sw-section">
  <div class="section-eyebrow">Strengths &amp; Weaknesses</div>
  <div class="sw-grid">
    <div class="sw-card strengths">
      <div class="kpi-eyebrow">Strengths</div>
      <div class="sw-list" id="sw-strengths"></div>
    </div>
    <div class="sw-card weaknesses">
      <div class="kpi-eyebrow">Weaknesses</div>
      <div class="sw-list" id="sw-weaknesses"></div>
    </div>
  </div>
</section>

<!-- ============ PLAY TYPES ============ -->
<section>
  <div class="section-eyebrow">Top Play Types</div>

<script src="players.js"></script>
<script>
(function () {
  // ---------- helpers ----------
  function bind(key, value) {
    document.querySelectorAll('[data-bind="' + key + '"]').forEach(function (el) {
      el.textContent = value;
    });
  }

  function fmt1(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return Number(v).toFixed(1);
  }

  function fmt2(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return Number(v).toFixed(2);
  }

  function fmtPct3(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return '.' + String(Math.round(v * 1000)).padStart(3, '0');
  }

  function ordinal(n) {
    if (n == null) return '';
    var m100 = n % 100;
    if (m100 >= 11 && m100 <= 13) return n + 'th';
    var m10 = n % 10;
    if (m10 === 1) return n + 'st';
    if (m10 === 2) return n + 'nd';
    if (m10 === 3) return n + 'rd';
    return n + 'th';
  }

  function colorForVerdict(v) {
    if (!v) return 'val-muted';
    var s = v.toLowerCase();
    if (s === 'excellent' || s === 'very good') return 'val-green';
    if (s === 'good' || s === 'average') return 'val-amber';
    if (s === 'below average') return 'val-muted';
    if (s === 'poor') return 'val-red';
    return 'val-muted';
  }

  function verdictClass(v) {
    if (!v) return 'v-belowavg';
    var s = v.toLowerCase().replace(/\s+/g, '');
    if (s === 'excellent') return 'v-excellent';
    if (s === 'verygood') return 'v-verygood';
    if (s === 'good') return 'v-good';
    if (s === 'average') return 'v-average';
    if (s === 'belowaverage') return 'v-belowavg';
    if (s === 'poor') return 'v-poor';
    return 'v-belowavg';
  }

  function ppsColorClass(p) {
    // For sub-rows / metrics without a verdict: use PPS thresholds.
    if (p === null || p === undefined || isNaN(p)) return 'val-muted';
    if (p >= 1.20) return 'val-green';
    if (p >= 1.00) return 'val-amber';
    if (p < 0.85) return 'val-red';
    return 'val-muted';
  }

  function efgColorClass(e) {
    if (e === null || e === undefined || isNaN(e)) return 'val-muted';
    return e >= 50 ? 'val-green' : 'val-red';
  }

  function heightDisplay(h) {
    // KenPom "6-4" -> "6'4\""
    if (!h) return '';
    var m = String(h).match(/^(\d+)-(\d+)$/);
    if (!m) return h;
    return m[1] + "'" + m[2] + '"';
  }

  // ---------- domain helpers ----------
  function usageRole(possPct) {
    if (possPct < 12) return { name: 'Bench/Limited',           band: '<12% poss'   };
    if (possPct < 16) return { name: 'Limited Role',            band: '12–16% poss' };
    if (possPct < 20) return { name: 'Role Player',             band: '16–20% poss' };
    if (possPct < 24) return { name: 'Significant Contributor', band: '20–24% poss' };
    if (possPct < 28) return { name: 'Major Contributor',       band: '24–28% poss' };
    return                  { name: 'Go-To Scorer',             band: '28%+ poss'   };
  }

  function ortgContext(ortg) {
    if (ortg == null) return '';
    if (ortg >= 120) return 'Elite efficiency (120+ ORtg)';
    if (ortg >= 110) return 'Above the 110 line for efficient scorers';
    if (ortg >= 100) return 'Average D1 scoring efficiency';
    return 'Below average for D1 scorers';
  }

  function diffContext(value, avg) {
    if (value == null) return '';
    var diff = value - avg;
    var sign = diff >= 0 ? '+' : '−';
    return sign + Math.abs(diff).toFixed(1) + ' vs D1 avg (' + avg.toFixed(1) + ')';
  }

  function efgValClass(efg, avg) {
    if (efg == null) return 'val-muted';
    if (efg >= avg + 2) return 'val-green';
    if (efg < avg - 2) return 'val-red';
    return 'val-amber';
  }

  function tsValClass(ts, avg) { return efgValClass(ts, avg); }

  function ortgValClass(o) {
    if (o == null) return 'val-muted';
    if (o >= 115) return 'val-green';
    if (o >= 105) return 'val-amber';
    return 'val-red';
  }

  function statValClass(value, goodThresh, badThresh, higherIsBetter) {
    if (value == null) return 'val-muted';
    if (higherIsBetter) {
      if (value >= goodThresh) return 'val-green';
      if (value <= badThresh)  return 'val-red';
      return 'val-amber';
    } else {
      if (value <= goodThresh) return 'val-green';
      if (value >= badThresh)  return 'val-red';
      return 'val-amber';
    }
  }

  // Maps each player key to the photo filename in Data/.
  var PHOTO_MAP = {
    autry:  'Data/autry pic Small.jpeg',
    hunger: 'Data/hunger pic Small.jpeg',
    slim:   'Data/slim pic Small.jpeg',
    woo:    'Data/woo pic Small.jpeg',
    gj:     'Data/johnson pic Small.jpeg',
    gerald: 'Data/drumgoole pic Small.jpeg',
  };

  // ---------- analysis (string -> <p>, array -> bulleted <ul>) ----------
  function renderAnalysis(analysis) {
    var slot = document.getElementById('analysis-slot');
    if (!slot) return;
    if (Array.isArray(analysis)) {
      var items = analysis.map(function (line) {
        return '<li>' + escapeHtml(line) + '</li>';
      }).join('');
      slot.innerHTML = '<ul>' + items + '</ul>';
    } else {
      var p = document.createElement('p');
      p.textContent = analysis || 'INSERT ANALYSIS HERE';
      slot.innerHTML = '';
      slot.appendChild(p);
    }
  }

  // ---------- render header / KPIs ----------
  function renderHeader(p, key) {
    document.title = p.name + ' · Scouting Report ' + p.season;
    bind('season-eyebrow', 'Scouting Report · ' + p.season);
    bind('name', p.name);
    var positionPart = p.primary_position || p.position || '';
    bind('lede', positionPart + ' · ' + p.team + ' · #' + p.number);

    // Bio strip: year, height, weight, hometown (NO position)
    var bioEl = document.querySelector('[data-bind="bio"]');
    bioEl.innerHTML = '';
    var parts = [
      p.year,
      heightDisplay(p.height),
      p.weight ? p.weight + ' lbs' : null,
      p.hometown,
    ].filter(function (x) { return x; });
    parts.forEach(function (v) {
      var s = document.createElement('span');
      s.textContent = v;
      bioEl.appendChild(s);
    });

    bind('archetype', p.archetype || '');

    // Photo
    var photoEl = document.getElementById('player-photo');
    var photoSrc = p.photo || PHOTO_MAP[key] || '';
    if (photoEl && photoSrc) {
      var img = document.createElement('img');
      img.src = photoSrc;
      img.alt = p.name || '';
      img.onerror = function () { img.remove(); };
      photoEl.appendChild(img);
    }
  }

  function renderKPI(p) {
    var k = p.kenpom;

    // Usage
    bind('usage-big', fmt1(k.possPct));
    var fill = Math.max(0, Math.min(100, (k.possPct / 30) * 100));
    document.querySelector('[data-bind="usage-bar-fill"]').style.width = fill + '%';
    var role = usageRole(k.possPct || 0);
    bind('usage-role', role.name);
    bind('usage-role-context', 'KenPom band · ' + role.band);

    // Efficiency
    var ortgEl = document.querySelector('[data-bind="ortg"]');
    ortgEl.textContent = fmt1(k.ortg);
    ortgEl.className = 'eff-value ' + ortgValClass(k.ortg);
    bind('ortg-context', ortgContext(k.ortg));

    var tsEl = document.querySelector('[data-bind="ts"]');
    tsEl.textContent = fmt1(k.ts);
    tsEl.className = 'eff-value ' + tsValClass(k.ts, 54.0);
    bind('ts-context', diffContext(k.ts, 54.0));

    var efgEl = document.querySelector('[data-bind="efg"]');
    efgEl.textContent = fmt1(k.efg);
    efgEl.className = 'eff-value ' + efgValClass(k.efg, 51.0);
    bind('efg-context', diffContext(k.efg, 51.0));

    // Foul rate
    bind('fd40', fmt1(k.fd40));
    bind('fc40', fmt1(k.fc40));
    var net = (k.fd40 != null && k.fc40 != null) ? (k.fd40 - k.fc40) : null;
    var netEl = document.querySelector('[data-bind="foul-net"]');
    if (net == null) {
      netEl.textContent = '—';
      netEl.className = 'foul-net-value val-muted';
    } else {
      netEl.textContent = (net >= 0 ? '+' : '−') + Math.abs(net).toFixed(1);
      // Per spec: net negative is amber (not red) — the FTRate often offsets
      var cls;
      if (net >= 0.5) cls = 'val-green';
      else if (net <= -0.5) cls = 'val-amber';
      else cls = 'val-muted';
      netEl.className = 'foul-net-value ' + cls;
    }

    // Analysis (synthesis paragraph)
    renderAnalysis(p.analysis);
  }

  // ---------- defense ----------
  function stlContext(v) {
    if (v == null) return '';
    if (v > 2.5) return 'Active hands';
    if (v >= 1.5) return 'Average';
    return 'Low activity';
  }
  function blkContext(v) {
    if (v == null) return '';
    if (v > 3.0) return 'Rim protector';
    if (v >= 1.0) return 'Some impact';
    return 'Limited';
  }
  function drContext(v) {
    if (v == null) return '';
    if (v > 18) return 'Elite glass';
    if (v >= 12) return 'Solid';
    if (v >= 8) return 'Average for guard';
    return 'Limited';
  }
  function toContext(v) {
    if (v == null) return '';
    if (v < 13) return 'Secure';
    if (v < 18) return 'Average';
    if (v <= 22) return 'Loose';
    return 'Turnover-prone';
  }

  function renderDefense(p) {
    var k = p.kenpom;

    var stlEl = document.querySelector('[data-bind="stl"]');
    stlEl.textContent = fmt1(k.stlPct);
    stlEl.className = 'def-value ' + statValClass(k.stlPct, 2.5, 1.0, true);
    bind('stl-context', stlContext(k.stlPct));

    var blkEl = document.querySelector('[data-bind="blk"]');
    blkEl.textContent = fmt1(k.blkPct);
    blkEl.className = 'def-value ' + statValClass(k.blkPct, 3.0, 0.5, true);
    bind('blk-context', blkContext(k.blkPct));

    var drEl = document.querySelector('[data-bind="dr"]');
    drEl.textContent = fmt1(k.drPct);
    drEl.className = 'def-value ' + statValClass(k.drPct, 18, 10, true);
    bind('dr-context', drContext(k.drPct));

    var toEl = document.querySelector('[data-bind="to"]');
    toEl.textContent = fmt1(k.toRate);
    toEl.className = 'def-value ' + statValClass(k.toRate, 13, 20, false);
    bind('to-context', toContext(k.toRate));
  }

  // ---------- play tiles ----------
  function buildPlayTile(p) {
    var article = document.createElement('article');
    article.className = 'play-tile';
    var ppsClass = colorForVerdict(p.verdict);
    var verdictClassName = verdictClass(p.verdict);
    var verdictText = p.verdict || '—';
    var pctText = p.percentile != null ? ordinal(p.percentile) + ' percentile' : '';

    var html = '<div class="play-tile-inner">' +
      '<div class="play-name">' + escapeHtml(p.name) + '</div>' +
      '<div class="play-meta">' + fmt1(p.timePct) + '% of plays · ' + (p.poss || 0) + ' poss</div>' +
      '<div class="play-pps ' + ppsClass + '">' + fmt2(p.pps) + '</div>' +
      '<div class="play-pps-label">PPP</div>' +
      '<span class="verdict ' + verdictClassName + '">' + escapeHtml(verdictText) + '</span>' +
      (pctText ? '<div class="percentile">' + pctText + '</div>' : '') +
      '</div>';

    if (p.subs && p.subs.length > 0) {
      html += '<details class="play-details"><summary>Show breakdown <span class="chev">+</span></summary>' +
        '<div class="subcategory-list">';
      p.subs.forEach(function (s) {
        html += '<div class="sub-row">' +
          '<span class="sub-name">' + escapeHtml(s.name) + '</span>' +
          '<span class="sub-meta">' + fmt1(s.timePct) + '% · ' + (s.poss || 0) + ' poss</span>' +
          '<span class="sub-pps ' + ppsColorClass(s.pps) + '">' + fmt2(s.pps) + '</span>' +
          '</div>';
      });
      html += '</div></details>';
    }

    article.innerHTML = html;
    return article;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderPlayTypes(p) {
    var tilesEl = document.getElementById('play-tiles');
    var extrasEl = document.getElementById('extras');
    tilesEl.innerHTML = '';
    extrasEl.innerHTML = '';

    // Drop play types with zero possessions (Synergy lists every category
    // even when the player never used it).
    var sorted = (p.playTypes || []).filter(function (pt) {
      return (pt.poss || 0) > 0;
    }).sort(function (a, b) {
      return (b.poss || 0) - (a.poss || 0);
    });
    var top3 = sorted.slice(0, 3);
    var rest = sorted.slice(3);

    top3.forEach(function (pt) { tilesEl.appendChild(buildPlayTile(pt)); });
    rest.forEach(function (pt) { extrasEl.appendChild(buildPlayTile(pt)); });

    var btn = document.getElementById('more-toggle');
    if (rest.length === 0) {
      btn.style.display = 'none';
    } else {
      btn.style.display = '';
    }
  }

  // ---------- strengths & weaknesses ----------
  function collectRankedItems(p) {
    var items = [];

    function pushPlay(parent, sub) {
      // Play-type values are PPP (Synergy doesn't report PPS for plays).
      if (sub) {
        items.push({
          name: sub.name, parent: parent.name,
          pps: sub.pps, poss: sub.poss || 0, unit: 'PPP',
        });
      } else {
        items.push({
          name: parent.name, parent: null,
          pps: parent.pps, poss: parent.poss || 0, unit: 'PPP',
        });
      }
    }

    (p.playTypes || []).forEach(function (pt) {
      pushPlay(pt, null);
      (pt.subs || []).forEach(function (s) { pushPlay(pt, s); });
    });

    function walkShot(node, parent) {
      // Don't add the "All Field Goal Attempts" aggregate to the ranking.
      if (node.name !== 'All Field Goal Attempts') {
        items.push({
          name: node.name,
          parent: parent ? parent.name : null,
          pps: node.pps, poss: node.poss || 0, unit: 'PPS',
        });
      }
      (node.subs || []).forEach(function (sub) {
        walkShot(sub, node);
      });
    }
    (p.shotTypes || []).forEach(function (s) { walkShot(s, null); });

    // Filter to ≥10 poss and a numeric pps.
    return items.filter(function (it) {
      return it.poss >= 10 && it.pps != null && !isNaN(it.pps);
    });
  }

  function renderStrengthsWeaknesses(p) {
    var ranked = collectRankedItems(p);
    var section = document.getElementById('sw-section');
    if (ranked.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = '';

    var byPps = ranked.slice().sort(function (a, b) { return b.pps - a.pps; });
    var n = byPps.length;
    var sCount = Math.min(3, Math.ceil(n / 2));
    var wCount = Math.min(3, n - sCount);
    var strengths = byPps.slice(0, sCount);
    var weaknesses = wCount > 0 ? byPps.slice(n - wCount).reverse() : [];

    function rowHTML(item, icon) {
      var label = item.parent
        ? escapeHtml(item.name) + ' <span class="sw-parent">(' + escapeHtml(item.parent) + ')</span>'
        : escapeHtml(item.name);
      return '<div class="sw-row">' +
        '<span class="sw-icon">' + icon + '</span>' +
        '<div>' +
          '<div class="sw-name">' + label + '</div>' +
          '<div class="sw-meta"><span class="sw-eff">' + fmt2(item.pps) + ' ' + item.unit + '</span> · ' + item.poss + ' poss</div>' +
        '</div>' +
        '</div>';
    }

    document.getElementById('sw-strengths').innerHTML =
      strengths.map(function (i) { return rowHTML(i, '✓'); }).join('');
    document.getElementById('sw-weaknesses').innerHTML =
      weaknesses.map(function (i) { return rowHTML(i, '×'); }).join('');
  }

  // ---------- shot chart ----------
  function renderShotChart(p) {
    var z = p.shotZones || {};
    var zones = [
      { key: 'arc',   data: z.beyondArc,      label: '3PT',   labelEl: 'vol-arc',   circleEl: 'zone-circle-arc',   fillEl: 'zone-fill-arc'   },
      { key: 'ra',    data: z.restrictedArea, label: 'RA',    labelEl: 'vol-ra',    circleEl: 'zone-circle-ra',    fillEl: 'zone-fill-ra'    },
      { key: 'mid',   data: z.midrange,       label: 'MID',   labelEl: 'vol-mid',   circleEl: 'zone-circle-mid',   fillEl: 'zone-fill-mid'   },
      { key: 'paint', data: z.paint,          label: 'PAINT', labelEl: 'vol-paint', circleEl: 'zone-circle-paint', fillEl: 'zone-fill-paint' },
    ];

    // Color zones by volume rank (deepest purple = highest volume).
    var purples = ['#5b2b9c', '#8a5cc0', '#d5c4ed', '#dfd3f6'];
    var byVolume = zones.slice().sort(function (a, b) {
      return (b.data && b.data.volume || 0) - (a.data && a.data.volume || 0);
    });
    byVolume.forEach(function (zone, idx) {
      var el = document.getElementById(zone.fillEl);
      if (el) el.setAttribute('fill', purples[idx]);
    });

    // Per-zone circles: size by volume, color by eFG.
    // Hide a circle only if the zone literally has zero shots; otherwise
    // floor the radius so small-volume zones remain visible.
    zones.forEach(function (zone) {
      var d = zone.data || { volume: 0, efg: null };
      var grp = document.getElementById(zone.circleEl);
      if (!grp) return;
      var volEl = document.getElementById(zone.labelEl);

      var hasShots = d && d.volume != null && d.volume > 0;
      if (!hasShots) {
        grp.style.display = 'none';
        if (volEl) volEl.textContent = '';
        return;
      }
      grp.style.display = '';

      var circle = grp.querySelector('circle');
      var efgText = grp.querySelector('text.z-efg');
      var r = Math.max(14, Math.min(34, 14 + Math.sqrt(d.volume) * 2.5));
      circle.setAttribute('r', r);
      circle.setAttribute('fill', (d.efg != null && d.efg >= 50) ? '#2f7a4a' : '#b23a3a');
      efgText.textContent = d.efg != null ? Math.round(d.efg) + '%' : '—';

      if (volEl) {
        var volStr = d.volume.toFixed(0) + '%';
        volEl.textContent = (zone.key === 'arc')
          ? '3PT · ' + volStr + ' OF SHOTS'
          : zone.label + ' · ' + volStr;
      }
    });

    renderZoneTable(zones);
  }

  // ---------- zone data table ----------
  function renderZoneTable(zones) {
    var tbody = document.getElementById('zone-table-body');
    if (!tbody) return;
    var purples = ['#5b2b9c', '#8a5cc0', '#d5c4ed', '#dfd3f6'];

    // Mirror the chart's volume-rank ordering so the swatches line up.
    var rows = zones.slice().sort(function (a, b) {
      return ((b.data && b.data.volume) || 0) - ((a.data && a.data.volume) || 0);
    });

    var fullNames = {
      arc: 'Beyond the Arc',
      ra: 'Restricted Area',
      mid: 'Midrange',
      paint: 'Paint (Non-RA)',
    };

    tbody.innerHTML = rows.map(function (zone, idx) {
      var d = zone.data || { volume: null, efg: null };
      var vol = d.volume != null ? d.volume.toFixed(1) + '%' : '—';
      var efg = d.efg != null ? d.efg.toFixed(1) + '%' : '—';
      var efgCls = (d.efg != null && d.efg >= 50) ? 'val-green' : (d.efg != null ? 'val-red' : 'val-muted');
      return '<div class="zone-row">' +
        '<span class="zone-swatch" style="background:' + purples[idx] + '"></span>' +
        '<span class="zone-name">' + fullNames[zone.key] + '</span>' +
        '<span class="zone-vol">' + vol + '</span>' +
        '<span class="zone-efg ' + efgCls + '">' + efg + '</span>' +
        '</div>';
    }).join('');
  }

  // ---------- footer ----------
  function renderFooter(p) {
    var games = p.games || '?';
    bind('footer-sample', p.season + ' · ' + games + ' games');
  }

  // ---------- entrypoint ----------
  function getPlayerKey() {
    var params = new URLSearchParams(window.location.search);
    var k = (params.get('player') || '').toLowerCase().trim();
    if (k && players[k]) return k;
    return Object.keys(players)[0];
  }

  function render() {
    var key = getPlayerKey();
    var p = players[key];
    if (!p) return;
    renderHeader(p, key);
    renderKPI(p);
    renderStrengthsWeaknesses(p);
    renderPlayTypes(p);
    renderShotChart(p);
    renderDefense(p);
    renderFooter(p);

    // Re-bind the more-plays toggle (extras was rebuilt).
    var btn = document.getElementById('more-toggle');
    var extras = document.getElementById('extras');
    if (btn && extras) {
      btn.onclick = function () {
        var open = extras.classList.toggle('open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        btn.textContent = open ? 'Hide extra play types' : 'View all play types';
      };
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>

</body>
</html>
